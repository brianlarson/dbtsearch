- pipeline: p---dbt-search-development
  name: 🚧 DBT Search Development
  refs:
  - refs/heads/develop
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  - type: PUSH
  variables:
  - key: DEV_IP
    value: 45.55.79.253
  - key: DEV_PASS
    value: '!encrypted 70xok637FYADXFJrFFymSd6kTusu/BXUtw+UMj70pbY=.pTEtijJZb39B1MIeSElIAw=='
    encrypted: true
  - key: DEV_PATH
    value: public_html
  - key: DEV_USER
    value: blarson721
  targets:
  - target: dbt-search-development
    type: SSH
    name: DBT Search Dev Server
    host: 45.55.79.253
    path: $DEV_PATH
    auth:
      username: $DEV_USER
      password: '!encrypted 5rFKlZNmUfe9S1PSgkgtXA==.OJYmucjVonEo4ZrYvnxFpw=='
  actions:
  - action: Transfer files
    type: TRANSFER
    deployment_excludes:
    - .ddev/
    - .cursor/
    - .vite/
    - frontend/node_modules/
    - frontend/test-results/
    - frontend/playwright-report/
    - frontend/storybook-static/
    - .env
    - .env.*
    - '!.env.example*'
    - vendor/
    - storage/
    - web/cpresources/
    - web/uploads/
    - config/license.key
    - node_modules/
    - '*.log'
    - .DS_Store
    deployment_includes:
    - storage/.gitignore
    - storage/logs/.gitignore
    - web/uploads/.gitignore
    targets:
    - dbt-search-development
  - action: Execute composer install --no-interaction && php craft up && php craft clear-caches/all
    type: SSH_COMMAND
    commands: composer install --no-interaction && php craft up && php craft clear-caches/all
    targets:
    - dbt-search-development
    run_as_script: true
