# MySQL 8 for Craft CMS. Used only until you migrate to DDEV primary MySQL (see docs/MIGRATION-MYSQL-ONLY.md).
# After migration, delete this file and use the primary "db" service.
services:
  mysql8:
    container_name: ddev-${DDEV_SITENAME}-mysql8
    image: mysql:8.0
    restart: "no"
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: craft
      MYSQL_USER: craft
      MYSQL_PASSWORD: craft
    ports:
      - "3306:3306"
    volumes:
      - mysql8_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql8_data: {}
